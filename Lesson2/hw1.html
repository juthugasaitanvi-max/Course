<!DOCTYPE html>
<html>
<body>

<p>A function can access variables defined inside the function:</p>

<button type="button" onclick="myFunction()">Click Me!</button>

<p id="demo"></p>
<p id="demo1"></p>
<p id="demo2"></p>

<script>
let b = 5;

function myFunction() {
    let a = 4;
    document.getElementById("demo").innerHTML = b * a;
    document.getElementById("demo1").innerHTML = "Function executed successfully.";
    document.getElementById("demo2").innerHTML = "Value of b = " + b;
}
</script>

</body>
</html>
