<!-- Topics to be covered:
 1. Paragraph Tag :Its used for creating paragraphs in HTML.
 2. Headings:Headings run from  h1 to h6 (largest font size to smallest.). They are used for titles an  organise sections in a webpage.
 3. Text-Formatting: Bold,Italics, Highlight, Small Text, Strikethrough,Subscript,Superscript, Block Quotation and inline quotation. -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 1</title>
</head>
<body>
    <!-- 1.Fact 1: The amazing octopus 2. Can lighting strike twice? 3. How smart are octopuses? 
     4.Did you know? 5. Fun comparison 6. Source  -->
    <h1><i>Did You</i><b><small> Know?</small></b></h1>
    <h2><mark>Fact 1:</mark> The Amazing Octopus</h2>
    <h3><del>How smart are octopuses?</del></h3>   
    <h4><mark>Can lighting strike twice?</mark></h4>
    <h5><sub>Fun</sub>Comparison</h5>
    <h6><sup>Source</sup></h6>

  <blockquote cite="www.google.com">This is the First HTML Session for Saitanvi.</blockquote>
  <p><q>She had JavaScript sessions previously.</q></p>
</body>
</html>
