<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<h2>Operator</h2>
<p id="demo"></p>
<script>
    // Addition
    // JavaScript supports operators like +, -, *, /
    let x = 5;
    let y = 2;
    let z = x + y;

    document.getElementById("demo").innerHTML = "this is the sum of x and y: " + z;
    </script>
</body>     
</html>
