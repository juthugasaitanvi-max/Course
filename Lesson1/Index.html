<!-- Activity 4:
1) Start the HTML document with `<!DOCTYPE html>`.

2) Open the `<html>` tag.

3) Inside the `<body>` tag:

4) Add a heading using `<h2>`:
   a) Text: "Operator"

5) Create an empty paragraph to display the result:
   a) Use `<p id="demo"></p>`
   b) This is where the calculated value will appear.

6) Add a `<script>` tag to write JavaScript code.

7) Inside the `<script>` tag:
   a) Add a comment to indicate the operation being performed:
      - Example: `// Addition`
   b) Add a comment reminding that JavaScript supports operators like:
      `+`, `-`, `*`, `/`

8) Create two variables:
   a) `x` with value `5`
   b) `y` with value `2`

9) Create a variable `z`:
   a) Add `x` and `y` using the `+` operator
   b) Store the result in `z`

10) Display the value of `z` on the webpage:
    a) Use `document.getElementById("demo").innerHTML = z;`

11) Close all tags properly:
    a) Close `</script>`, `</body>`, and `</html>`.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Operator</h2>
    <p id="demo"></p>

    <script>
        // Additon:
        let x=5;
        let y=2;
        let z=x+y

        document.getElementById("demo").innerHTML="This is the sum of x and y: "+ z;

    </script>
</body>
</html>
